<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoChieuGap — Unit Tests</title>
    <style>
        :root {
            --pass: #10b981;
            --fail: #ef4444;
            --skip: #f59e0b;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .summary {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 15px;
        }

        .summary-item .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-pass { background: var(--pass); }
        .dot-fail { background: var(--fail); }
        .dot-skip { background: var(--skip); }

        .test-group {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .test-group__header {
            padding: 12px 16px;
            font-weight: 700;
            font-size: 15px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
        }

        .test-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .test-row:last-child { border-bottom: none; }

        .test-status {
            font-size: 16px;
            width: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .test-name { flex: 1; }

        .test-detail {
            font-size: 12px;
            color: var(--muted);
            max-width: 300px;
            text-align: right;
        }

        .test-detail.error {
            color: var(--fail);
            font-weight: 500;
        }

        #progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--pass);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>
    <h1>🧪 HoChieuGap — Unit Tests</h1>
    <p class="subtitle">Pure logic unit tests • TDD • Zero dependencies</p>

    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div class="summary" id="summary">
        <div class="summary-item">
            <div class="dot dot-pass"></div><span id="pass-count">0</span> Pass
        </div>
        <div class="summary-item">
            <div class="dot dot-fail"></div><span id="fail-count">0</span> Fail
        </div>
        <div class="summary-item">
            <div class="dot dot-skip"></div><span id="skip-count">0</span> Skip
        </div>
        <div class="summary-item" style="margin-left:auto; color:var(--muted);">
            <span id="total-count">0</span> total
        </div>
    </div>

    <div id="test-results"></div>

    <!-- Load data.js first (contains all testable functions & data) -->
    <script src="../js/data.js"></script>
    <script src="unit-test.js"></script>
</body>

</html>
